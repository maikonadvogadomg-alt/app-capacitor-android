<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>
  <style>
    body { margin:0; background:#111; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:#fff; flex-direction:column; gap:12px; }
    .spinner { width:40px; height:40px; border:3px solid #333; border-top-color:#00d4aa; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#888; font-size:14px; }
  </style>

  <!-- PWA Android -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <div class="spinner"></div>
  <p>Carregando aplicativo...</p>
  <script>
    // Fallback: se o server.url do capacitor.config.json estiver configurado,
    // o Capacitor redireciona automaticamente. Esta página aparece só offline.
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
